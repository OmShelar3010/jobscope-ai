version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: jobscope_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: jobscope_user
      POSTGRES_PASSWORD: jobscope_password
      POSTGRES_DB: jobscope_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: jobscope_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
